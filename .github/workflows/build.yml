name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: Build & Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  # TODO: Windows and Android CI configuration / build scripts (see README).

  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: swift-format
        run: swift format lint --strict --recursive Sources Tests Package.swift
